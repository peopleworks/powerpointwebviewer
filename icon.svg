<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- PeopleWorks blue gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2c6cb0"/>
    </linearGradient>
    <!-- Light accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#63b3ed"/>
      <stop offset="100%" style="stop-color:#4a90d9"/>
    </linearGradient>
    <!-- Globe line color -->
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" style="stop-color:#d4e8f7" stop-opacity="0.8"/>
    </linearGradient>
    <!-- Subtle shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a365d" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background: Rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="26" ry="26" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Inner subtle border -->
  <rect x="6" y="6" width="116" height="116" rx="24" ry="24" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Globe circle -->
  <circle cx="64" cy="58" r="30" fill="none" stroke="url(#globeGrad)" stroke-width="2.8" opacity="0.9"/>

  <!-- Globe horizontal lines -->
  <ellipse cx="64" cy="46" rx="26" ry="0" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="34" y1="58" x2="94" y2="58" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <ellipse cx="64" cy="70" rx="26" ry="0" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <!-- Globe vertical meridian -->
  <ellipse cx="64" cy="58" rx="14" ry="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <!-- Globe center vertical line -->
  <line x1="64" y1="28" x2="64" y2="88" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>

  <!-- "P" letter - bold, modern -->
  <g transform="translate(64, 58)">
    <!-- P background circle (accent) -->
    <circle cx="0" cy="0" r="16" fill="url(#accentGrad)" opacity="0.95"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <!-- Letter P -->
    <text x="0" y="6" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="800" fill="white" letter-spacing="-0.5">P</text>
  </g>

  <!-- Small PowerPoint-style play/slide triangle -->
  <g transform="translate(86, 80)">
    <circle cx="0" cy="0" r="10" fill="#e8553d" opacity="0.95"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
    <polygon points="-3,-5 5,0 -3,5" fill="white" opacity="0.95"/>
  </g>

  <!-- Bottom text: "WEB" label -->
  <rect x="34" y="94" width="60" height="18" rx="9" ry="9" fill="rgba(255,255,255,0.2)"/>
  <text x="64" y="107" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="white" letter-spacing="2.5">WEB</text>
</svg>
